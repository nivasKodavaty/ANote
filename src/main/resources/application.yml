spring:
  application:
    name: anote1
  profiles:
    active: local
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=1000,expireAfterWrite=24h

gemini:
  api-key: ${GEMINI_API_KEY:placeholder}
  model: gemini-1.5-flash
  base-url: https://generativelanguage.googleapis.com

google:
  client-id: ${GOOGLE_CLIENT_ID:placeholder}

jwt:
  secret: ${JWT_SECRET:local-dev-secret-minimum-32-characters-long}
  expiration-ms: 86400000
  refresh-expiration-ms: 604800000

server:
  port: ${APP_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health

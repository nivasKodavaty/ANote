spring:
  datasource:
    url: ${DATABASE_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 3
      connection-timeout: 30000
  flyway:
    enabled: true
    locations: classpath:db/migration
  jpa:
    show-sql: false

logging:
  level:
    com.gtr3.ANote: INFO
